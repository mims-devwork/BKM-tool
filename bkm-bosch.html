<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BKM Studio \u00e2\u0080\u0094 Bosch</title>
<script src="assets/msal.min.js"></script>
<script src="assets/html2canvas.min.js"></script>
<script src="assets/docx.min.js"></script>
<style>
  @font-face {
    font-family: 'Inter';
    src: url('assets/inter.woff2') format('woff2');
    font-weight: 100 900;
    font-display: swap;
  }
  :root {
    --bosch-red:  #e8192c;
    --bosch-dark: #c0001a;
    --grad:       linear-gradient(135deg, #c0001a 0%, #e8192c 100%);
    --bg:         #f0f2f5;
    --surface:    #ffffff;
    --surface2:   #f7f8fa;
    --surface3:   #ebedf0;
    --border:     #dde1e7;
    --border2:    #c4c9d4;
    --text:       #1a1f2e;
    --text2:      #374151;
    --muted:      #6b7585;
    --subtle:     #4b5563;
    --green:      #16a34a;
    --amber:      #b45309;
    --shadow-sm:  0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
    --shadow-md:  0 4px 12px rgba(0,0,0,.09);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter','Segoe UI',system-ui,sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface3); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .app { max-width: 940px; margin: 0 auto; padding-bottom: 52px; }

  /* \u00e2\u0094\u0080\u00e2\u0094\u0080 CORPORATE HEADER \u00e2\u0094\u0080\u00e2\u0094\u0080 */
  .corp-banner {
    background: var(--surface);
    border-bottom: 3px solid var(--bosch-red);
    box-shadow: var(--shadow-md);
    margin-bottom: 28px;
  }
  .corp-banner-inner { display: flex; align-items: stretch; }
  .corp-accent-bar { width: 5px; background: var(--grad); flex-shrink: 0; }

  .corp-logo-zone {
    padding: 16px 32px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-right: 1px solid var(--border);
    min-width: 210px; gap: 6px;
    cursor: pointer; transition: background .15s; position: relative;
  }
  .corp-logo-zone:hover { background: var(--surface2); }
  .corp-logo-zone:hover .logo-hint { opacity: 1; }
  .logo-hint { position: absolute; bottom: 6px; font-size: 9px; color: var(--muted); opacity: 0; transition: opacity .2s; font-weight: 500; letter-spacing: .3px; }
  .corp-logo-img { max-height: 50px; max-width: 165px; object-fit: contain; display: block; }
  .corp-logo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .corp-logo-placeholder .icon { font-size: 28px; }
  .corp-logo-placeholder .txt { font-size: 10px; color: var(--muted); font-weight: 600; }

  .corp-title-zone { flex: 1; padding: 16px 28px; display: flex; flex-direction: column; justify-content: center; }
  .corp-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--bosch-red); margin-bottom: 4px; }
  .corp-title   { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -.4px; }
  .corp-sub     { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 500; }

  .corp-actions { padding: 16px 24px; display: flex; align-items: center; border-left: 1px solid var(--border); }
  .btn-new { background: var(--grad); color: #fff; border: none; padding: 9px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; box-shadow: 0 2px 8px rgba(232,25,44,.3); transition: opacity .15s; }
  .btn-new:hover { opacity: .88; }

  .app-inner { padding: 0 24px; }

  /* \u00e2\u0094\u0080\u00e2\u0094\u0080 STEP BAR \u00e2\u0094\u0080\u00e2\u0094\u0080 */
  .stepbar { display: flex; align-items: center; margin-bottom: 22px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 22px; box-shadow: var(--shadow-sm); }
  .sb-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .sb-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; transition: all .3s; }
  .sb-dot.done   { background: var(--green); color: #fff; }
  .sb-dot.active { background: var(--grad); color: #fff; box-shadow: 0 0 0 3px rgba(232,25,44,.15); }
  .sb-dot.idle   { background: var(--surface3); color: var(--muted); border: 1px solid var(--border); }
  .sb-label { font-size: 10px; font-weight: 600; white-space: nowrap; }
  .sb-label.active { color: var(--bosch-red); }
  .sb-label.done   { color: var(--green); }
  .sb-label.idle   { color: var(--muted); }
  .sb-line { flex: 1; height: 2px; margin: 0 6px; margin-bottom: 18px; }
  .sb-line.done { background: var(--green); }
  .sb-line.idle { background: var(--border); }

  /* \u00e2\u0094\u0080\u00e2\u0094\u0080 CARDS \u00e2\u0094\u0080\u00e2\u0094\u0080 */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 26px; margin-bottom: 18px; box-shadow: var(--shadow-sm); }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 5px; color: var(--text); }
  .card-sub   { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }

  /* \u00e2\u0094\u0080\u00e2\u0094\u0080 BUTTONS \u00e2\u0094\u0080\u00e2\u0094\u0080 */
  .btn { border: none; border-radius: 7px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 7px; transition: all .15s; font-family: inherit; }
  .btn:hover { opacity: .88; }
  .btn-primary { background: var(--grad); color: #fff; padding: 12px 20px; font-size: 14px; width: 100%; box-shadow: 0 2px 8px rgba(232,25,44,.28); }
  .btn-success { background: linear-gradient(135deg,#16a34a,#15803d); color: #fff; padding: 12px 20px; font-size: 14px; width: 100%; box-shadow: 0 2px 8px rgba(22,163,74,.22); }
  .btn-ghost   { background: var(--surface); border: 1px solid var(--border2); color: var(--subtle); padding: 8px 14px; font-size: 13px; }
  .btn-ghost:hover { border-color: var(--bosch-red); color: var(--bosch-red); opacity: 1; }
  .btn-danger  { background: #fff0f0; border: 1px solid #fca5a5; color: var(--bosch-dark); padding: 6px 8px; border-radius: 6px; }
  .btn-sm      { padding: 5px 10px; font-size: 11px; border-radius: 5px; }

  /* \u00e2\u0094\u0080\u00e2\u0094\u0080 EXPORT GRID \u00e2\u0094\u0080\u00e2\u0094\u0080 */
  .export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .export-fmt-btn { border: 1px solid var(--border); border-radius: 10px; background: var(--surface2); padding: 16px 14px; cursor: pointer; font-family: inherit; text-align: left; transition: all .2s; display: flex; align-items: center; gap: 13px; box-shadow: var(--shadow-sm); }
  .export-fmt-btn:hover { border-color: var(--bosch-red); background: #e8192c06; box-shadow: var(--shadow-md); }
  .export-fmt-btn.loading { opacity: .55; pointer-events: none; }
  .export-fmt-btn.done { border-color: var(--green); background: rgba(22,163,74,.05); }
  .efb-icon { width: 42px; height: 42px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .efb-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .efb-sub   { font-size: 11px; color: var(--muted); }

  /* \u00e2\u0094\u0080\u00e2\u0094\u0080 MODE TOGGLE \u00e2\u0094\u0080\u00e2\u0094\u0080 */
  .mode-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .mode-btn { padding: 11px; border-radius: 7px; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); font-weight: 600; font-size: 13px; cursor: pointer; transition: all .2s; font-family: inherit; }
  .mode-btn.active { background: var(--grad); border-color: transparent; color: #fff; box-shadow: 0 2px 8px rgba(232,25,44,.25); }

  /* \u00e2\u0094\u0080\u00e2\u0094\u0080 INPUTS \u00e2\u0094\u0080\u00e2\u0094\u0080 */
  textarea, input[type=text], input[type=password], input[type=range] { font-family: inherit; outline: none; }
  textarea, input[type=text], input[type=password] {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 7px;
    color: var(--text); font-size: 13px; transition: all .2s;
  }
  textarea:focus, input[type=text]:focus, input[type=password]:focus {
    border-color: var(--bosch-red); box-shadow: 0 0 0 3px rgba(232,25,44,.08);
  }
  .input-full { width: 100%; padding: 10px 13px; display: block; }
  textarea { resize: vertical; line-height: 1.7; }

  /* API Key */
  .apikey-box { background: #fff5f5; border: 1px solid #fecaca; border-radius: 9px; padding: 15px; margin-bottom: 16px; }
  .apikey-label { font-size: 10px; font-weight: 700; color: var(--bosch-dark); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .apikey-row { display: flex; gap: 8px; }
  .apikey-row input { flex: 1; font-family: monospace; font-size: 13px; padding: 9px 12px; }
  .apikey-toggle { background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; padding: 0 12px; color: var(--muted); cursor: pointer; font-size: 12px; white-space: nowrap; font-family: inherit; }
  .apikey-hint { font-size: 11px; color: var(--muted); margin-top: 7px; }
  .apikey-hint a { color: var(--bosch-red); text-decoration: none; font-weight: 500; }

  /* Upload */
  .upload-zone { border: 2px dashed var(--border2); border-radius: 10px; padding: 32px; text-align: center; cursor: pointer; transition: all .2s; background: var(--surface2); }
  .upload-zone:hover { border-color: var(--bosch-red); background: rgba(232,25,44,.03); }
  .upload-zone.has-file { border-color: var(--green); background: rgba(22,163,74,.04); }

  /* Frame progress */
  .frame-progress { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 16px; margin-top: 14px; }
  .frame-progress-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
  .progress-bar-wrap { background: var(--surface3); border-radius: 20px; height: 7px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar-fill { height: 100%; background: var(--grad); border-radius: 20px; transition: width .3s; }
  .progress-label { font-size: 11px; color: var(--muted); }
  .frames-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(100px,1fr)); gap: 8px; margin-top: 12px; max-height: 220px; overflow-y: auto; }
  .frame-thumb { border-radius: 6px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 16/9; }
  .frame-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .frame-count-badge { background: rgba(232,25,44,.1); border: 1px solid rgba(232,25,44,.25); border-radius: 20px; padding: 3px 12px; font-size: 11px; color: var(--bosch-red); display: inline-block; margin-top: 8px; font-weight: 600; }

  /* Slider */
  .slider-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .slider-row label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .slider-row input[type=range] { flex: 1; accent-color: var(--bosch-red); }

  /* Error */
  .error-box { margin-top: 12px; padding: 10px 14px; background: #fff5f5; border: 1px solid #fca5a5; border-radius: 8px; color: #9b1c1c; font-size: 12px; font-weight: 500; }

  /* Generating */
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.06);opacity:.8} }
  .pulse { animation: pulse 1.6s infinite; }
  .gen-center { text-align: center; padding: 20px 0 28px; }
  .gen-icon { width: 60px; height: 60px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 16px; box-shadow: 0 4px 18px rgba(232,25,44,.3); }
  .gen-steps { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
  .gen-step { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface2); border-radius: 8px; font-size: 13px; border: 1px solid var(--border); }
  .gen-step-icon { font-size: 15px; flex-shrink: 0; }
  .gen-step.done   { border-color: rgba(22,163,74,.4); color: var(--green); background: rgba(22,163,74,.05); }
  .gen-step.active { border-color: rgba(232,25,44,.35); color: var(--bosch-red); background: rgba(232,25,44,.04); }
  .gen-step.idle   { color: var(--muted); }
  .stream-box { max-height: 160px; overflow: auto; background: var(--surface3); border-radius: 8px; padding: 12px; border: 1px solid var(--border); text-align: left; margin-top: 16px; }
  .stream-box pre { color: var(--muted); font-size: 10px; white-space: pre-wrap; word-break: break-word; }

  /* Review */
  .bkm-title-input { width: 100%; font-size: 20px; font-weight: 800; background: transparent; border: none; border-bottom: 2px solid var(--border); color: var(--text); padding-bottom: 6px; outline: none; font-family: inherit; margin-bottom: 10px; }
  .bkm-title-input:focus { border-bottom-color: var(--bosch-red); }
  .badge-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .badge { font-size: 10px; border-radius: 20px; padding: 3px 11px; font-weight: 600; }
  .badge-red   { background: rgba(232,25,44,.1); border: 1px solid rgba(232,25,44,.25); color: var(--bosch-red); }
  .badge-green { background: rgba(22,163,74,.1); border: 1px solid rgba(22,163,74,.25); color: var(--green); }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .meta-card { background: var(--surface2); border-radius: 8px; padding: 12px; border: 1px solid var(--border); }
  .meta-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  .meta-card textarea { background: transparent; border: none; color: var(--text2); font-size: 12px; width: 100%; outline: none; }
  .prereq-box { background: var(--surface2); border-radius: 8px; padding: 12px; border: 1px solid var(--border); }
  .prereq-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 7px; }
  .prereq-tag { font-size: 12px; background: var(--surface); border: 1px solid var(--border2); border-radius: 5px; padding: 3px 10px; color: var(--subtle); display: flex; align-items: center; gap: 5px; }
  .prereq-tag button { background: none; border: none; color: var(--bosch-red); cursor: pointer; font-size: 15px; line-height: 1; padding: 0; }

  /* Step cards */
  .step-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 13px; box-shadow: var(--shadow-sm); }
  .step-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
  .step-badge { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; color: #fff; flex-shrink: 0; }
  .step-header-title { flex: 1; font-weight: 700; font-size: 13px; color: var(--text); }
  .step-header input[type=text] { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; color: var(--text); font-size: 13px; font-weight: 600; font-family: inherit; outline: none; }
  .step-actions { display: flex; gap: 5px; }
  .step-body { padding: 14px; display: grid; grid-template-columns: 1fr 200px; gap: 14px; border-top: 1px solid var(--border); }
  .field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
  .field-text { color: var(--text2); font-size: 12px; line-height: 1.7; }
  .action-code { display: block; font-family: 'Courier New',monospace; font-size: 12px; padding: 7px 10px; border-radius: 6px; border: 1px solid; margin-top: 4px; }
  .note-text { font-size: 12px; color: var(--amber); margin-top: 4px; }
  .step-screenshot-wrap { margin-top: 5px; }
  .step-frame-img { width: 100%; border-radius: 7px; border: 1px solid var(--border); display: block; }
  .step-screenshot-placeholder { aspect-ratio: 16/9; border-radius: 7px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: 1px dashed; }
  .add-step-btn { width: 100%; padding: 10px; border-radius: 8px; border: 2px dashed var(--border2); background: transparent; color: var(--muted); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; margin-bottom: 16px; font-family: inherit; font-size: 13px; transition: all .2s; }
  .add-step-btn:hover { border-color: var(--bosch-red); color: var(--bosch-red); }
  .outcome-box { background: var(--surface); border: 1px solid rgba(22,163,74,.3); border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
  .outcome-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--green); margin-bottom: 7px; letter-spacing: 1px; }
  .outcome-box textarea { background: transparent; border: none; color: var(--text2); font-size: 13px; width: 100%; line-height: 1.7; outline: none; }
  .section-heading { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 12px; }

  /* Export / stats */
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 22px; }
  .stat-card { background: var(--surface2); border-radius: 10px; padding: 16px; text-align: center; border: 1px solid var(--border); }
  .stat-val { font-size: 28px; font-weight: 800; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .preview-frame { width: 100%; height: 500px; border: none; border-radius: 9px; background: #fff; margin-top: 12px; box-shadow: var(--shadow-md); }
  .success-banner { text-align: center; padding: 18px 0 24px; }
  .success-icon { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg,#16a34a,#15803d); display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 12px; }
  .bottom-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .btn-back { padding: 12px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); color: var(--muted); font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; transition: all .15s; box-shadow: var(--shadow-sm); }
  .btn-back:hover { border-color: var(--bosch-red); color: var(--bosch-red); }
</style>
</head>
<body>
<div id="auth-overlay" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="background:var(--surface);border-radius:12px;padding:40px 36px;text-align:center;box-shadow:var(--shadow-md);max-width:360px;width:90%;border:1px solid var(--border)">
    <div style="font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--bosch-red);margin-bottom:6px">BKM Studio</div>
    <div style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px">Welcome back</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6">Sign in with your Bosch account to access the BKM generator.</div>
    <button id="signin-btn" onclick="handleSignIn()" style="background:var(--grad);color:#fff;border:none;border-radius:8px;padding:13px 32px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;box-shadow:0 2px 8px rgba(232,25,44,.28)">Sign in with Microsoft</button>
    <p id="auth-error" style="color:var(--bosch-dark);font-size:12px;margin-top:12px;display:none;background:#fff5f5;padding:8px 12px;border-radius:6px;border:1px solid #fca5a5"></p>
  </div>
</div>
<div class="app">

  <!-- CORPORATE HEADER -->
  <div class="corp-banner">
    <div class="corp-banner-inner">
      <div class="corp-accent-bar"></div>

      <!-- Logo \u00e2\u0080\u0094 click to change -->

  ['input','gen','review','export'].forEach(function(p) {
    document.getElementById('page-'+p).style.display = (p===s) ? '' : 'none';
  });
  document.getElementById('newBkmBtn').style.display = (s!=='input') ? '' : 'none';
  renderStepBar();
  if (s==='input')  renderInput();
  if (s==='gen')    renderGen();
  if (s==='review') renderReview();
  if (s==='export') { state.exportHtml = generateBKMHtml(state.bkm); renderExport(); }
}

function renderStepBar() {
  var steps = [{label:'Input'},{label:'Analyse'},{label:'Review & Edit'},{label:'Export'}];

  var html  = '';
  steps.forEach(function(s,i) {
    var done=i<cur, active=i===cur;
    html += '<div class="sb-item">'
          + '<div class="sb-dot '+(done?'done':active?'active':'idle')+'">'+(done?'\u00e2\u009c\u0093':(i+1))+'</div>'
          + '<div class="sb-label '+(done?'done':active?'active':'idle')+'">'+s.label+'</div>'
          + '</div>';
    if (i<steps.length-1) html += '<div class="sb-line '+(done?'done':'idle')+'"></div>';
  });
  document.getElementById('stepbar').innerHTML = html;
}

  var video=document.getElementById('frameVideo'), canvas=document.getElementById('frameCanvas');
  var ctx=canvas.getContext('2d'), url=URL.createObjectURL(state.videoFile);
  video.src=url; video.load();
  video.onloadedmetadata=function(){
    var dur=video.duration, iv=state.frameInterval, times=[];
    for(var t=0;t<dur;t+=iv) times.push(t);
    if(!times.length) times.push(0);
    if(times.length>20){var st=dur/20;times=[];for(var i=0;i<20;i++) times.push(i*st);}
    var frames=[],cur=0;
    function next(){
      if(cur>=times.length){state.frames=frames;URL.revokeObjectURL(url);showFrames(frames,dur);return;}
      var pct=Math.round(cur/times.length*100);
      var f=document.getElementById('progFill'),l=document.getElementById('progLabel');
      if(f) f.style.width=pct+'%';
      if(l) l.textContent='Frame '+(cur+1)+' of '+times.length+' (at '+Math.round(times[cur])+'s)';
      video.currentTime=times[cur];
    }
    video.onseeked=function(){
      canvas.width=Math.min(video.videoWidth,1280);canvas.height=Math.min(video.videoHeight,720);
      var sc=Math.min(canvas.width/video.videoWidth,canvas.height/video.videoHeight);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(video,0,0,video.videoWidth*sc,video.videoHeight*sc);
      frames.push({dataUrl:canvas.toDataURL('image/jpeg',.7),time:times[cur]});
      cur++; next();
    };
    video.onerror=function(){section.innerHTML='<div class="error-box">\u00e2\u009a\u00a0 Could not load video. Try MP4 format.</div>';};
    next();
  };
}

function showFrames(frames,dur){
  var s=document.getElementById('frames-section');
  if(!s) return;
  var th=frames.map(function(f){return '<div class="frame-thumb" title="'+Math.floor(f.time/60)+'m '+Math.round(f.time%60)+'s"><img src="'+f.dataUrl+'"/></div>';}).join('');
  s.innerHTML='<div class="frame-progress"><div class="frame-progress-title">\u00e2\u009c\u0085 Frames ready \u00e2\u0080\u0094 AI will analyse these</div><div class="frames-grid">'+th+'</div><span class="frame-count-badge">'+frames.length+' frames \u00c2\u00b7 '+Math.round(dur)+'s video</span></div>';
}

// \u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080
//  GENERATE API CALL
// \u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080
async function generate(){
  var promptEl=document.getElementById('promptInput');
  if(promptEl) state.prompt=promptEl.value;
  var isVideo=state.mode==='video';
  var token;
  try { token = await getAccessToken(); }
  catch(authErr) { setStage('input'); showError('Sign-in required. Please refresh and log in.'); return; }
  if(isVideo&&state.frames.length===0){showError('Please upload a video and wait for frame extraction to complete.');return;}
  if(!isVideo&&!state.prompt.trim()){showError('Please enter a process description.');return;}
  showError(''); setStage('gen');

  var sys='You are a technical documentation expert specialising in Best Known Methods (BKMs).\
'
    +(isVideo?'You will be given a series of video frames from a tutorial or screen recording. Examine each frame carefully to identify what actions are being performed \u00e2\u0080\u0094 look for clicks, typed text, UI elements, menus, and changes between frames. Use this to write a detailed step-by-step BKM.\
':'')
    +'Return ONLY valid JSON in a fenced code block:\
```json\
'
    +'{"title":"Action-oriented BKM title","purpose":"One sentence purpose","scope":"Who this applies to","prerequisites":["item1"],"steps":[{"title":"Step title","description":"Detailed explanation","action":"Exact click/command/path","note":"Warning or tip or empty string","frameIndex":0}],"expectedOutcome":"What success looks like","troubleshooting":["Issue and fix 1"]}\
```\
'
    +'For frameIndex: assign the 0-based index of the frame that best illustrates each step. Generate 5 to 12 steps.';

  try {
    var content=[];
    if(isVideo){
      setGenStep(1);
      // OpenAI image format: { type:'image_url', image_url:{ url:'data:image/jpeg;base64,...' } }
      // Anthropic format was: { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:... } }
      var imgMessages = [];
      for(var fi=0;fi<state.frames.length;fi++){
        var fr=state.frames[fi];
        imgMessages.push({type:'text',text:'Frame '+(fi+1)+' (at '+Math.floor(fr.time/60)+'m '+Math.round(fr.time%60)+'s):'});
        imgMessages.push({
          type:      'image_url',
          image_url: { url: fr.dataUrl }   // OpenAI accepts full data URL directly
        });
      }
      setGenStep(2);
      imgMessages.push({type:'text',text:'Based on the '+state.frames.length+' frames above, create a detailed BKM guide.'+(state.prompt?'\
\
Additional context: '+state.prompt:'')});
      content = imgMessages;
    } else {
      setGenStep(1);
      // Plain text \u00e2\u0080\u0094 same structure works for both Anthropic and OpenAI
      content = state.prompt;  // OpenAI accepts a plain string for text-only messages
    }
    setGenStep(2);

    // Build OpenAI-format messages array
    // System prompt goes as a separate message with role:'system'
    // User content (text + images) goes as role:'user'
    var openAiMessages = [
      { role: 'system', content: sys },
      { role: 'user',   content: content }
    ];

    var res=await fetch(AZURE_ENDPOINT+'/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body:JSON.stringify({
        model:       AZURE_MODEL,    // 'gpt-4.1' \u00e2\u0080\u0094 your deployment name
        max_tokens:  4000,
        stream:      true,
        messages:    openAiMessages
      })
    });
    if(res.status===401||res.status===403){setStage('input');showError('Access denied. Contact your admin to request access.');return;}
    if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error(e&&e.error?e.error.message:(e.message||'HTTP '+res.status));}
    setGenStep(3);

    // Azure OpenAI streaming uses OpenAI SSE format:
    // data: {"choices":[{"delta":{"content":"..."},"index":0}]}
    // This is different from Anthropic's format so we parse differently
    var reader=res.body.getReader(),dec=new TextDecoder(),full='';
    while(true){
      var rd=await reader.read();if(rd.done)break;
      var lines=dec.decode(rd.value).split('\
');
      for(var li=0;li<lines.length;li++){
        var line=lines[li];if(!line.startsWith('data: '))continue;
        var data=line.slice(6).trim();
        if(data==='[DONE]') break;   // Azure sends [DONE] to signal end of stream
        try{
          var j=JSON.parse(data);
          var delta=j.choices&&j.choices[0]&&j.choices[0].delta;
          if(delta&&delta.content){
            full+=delta.content;
            var sb=document.getElementById('streamBox'),st=document.getElementById('streamText');
            if(sb&&st){sb.style.display='';st.textContent=full.slice(-600);}
          }
        }catch(pe){}
      }
    }
    var parsed=parseBKM(full);
    if(parsed){state.bkm=parsed;setStage('review');}
    else{setStage('input');showError('Could not parse the BKM. Please try again.');}
  } catch(err){setStage('input');showError('API Error: '+err.message);}
}

function parseBKM(raw){try{var m=raw.match(/```json\s*([\s\S]*?)```/);return JSON.parse((m?m[1]:raw).trim());}catch(e){return null;}}

// \u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080\u00e2\u0094\u0080

async function exportWord(){
  setBtnState('word','loading');setExportStatus('\u00e2\u008f\u00b3 Building Word document\u00e2\u0080\u00a6','loading');
  try{
    if(typeof docx==='undefined') throw new Error('docx library not loaded. Check internet connection.');
    var bkm=state.bkm;
    var {Document,Packer,Paragraph,TextRun,ImageRun,HeadingLevel,AlignmentType,BorderStyle,WidthType,ShadingType,LevelFormat}=docx;
    function para(text,opts){opts=opts||{};return new Paragraph({children:[new TextRun({text:String(text||''),size:opts.size||24,color:opts.color||'374151',bold:opts.bold||false,font:'Arial',italics:opts.italic||false})],spacing:{after:opts.spaceAfter||140},indent:opts.indent?{left:opts.indent}:undefined});}
    function label(text,col){return new Paragraph({children:[new TextRun({text:text.toUpperCase(),size:16,color:col||'6B7585',bold:true,font:'Arial'})],spacing:{before:160,after:80}});}
    function divider(){return new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:4,color:'DDE1E7',space:1}},spacing:{before:180,after:180}});}
    async function makeImg(frame){
      if(!frame)return null;
      try{var b64=frame.dataUrl.split(',')[1],bin=atob(b64),bytes=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new ImageRun({data:bytes,transformation:{width:560,height:315},type:'jpg'});}catch(e){return null;}
    }
    var children=[];
    children.push(new Paragraph({children:[new TextRun({text:'BEST KNOWN METHOD',size:18,color:'C0001A',bold:true,font:'Arial',characterSpacing:200})],spacing:{after:80}}));
    children.push(new Paragraph({children:[new TextRun({text:bkm.title,size:52,bold:true,color:'1A1F2E',font:'Arial'})],spacing:{after:200}}));
    children.push(new Paragraph({children:[new TextRun({text:new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),size:20,color:'6B7585',font:'Arial'})],spacing:{after:320}}));
    children.push(divider());
    children.push(label('Purpose','C0001A'));children.push(para(bkm.purpose,{color:'1A1F2E'}));
    children.push(label('Scope','16A34A'));children.push(para(bkm.scope,{color:'1A1F2E'}));
    children.push(divider());
    if((bkm.prerequisites||[]).length>0){
      children.push(label('Prerequisites','6B7585'));
      bkm.prerequisites.forEach(function(p){children.push(new Paragraph({children:[new TextRun({text:'\u00e2\u009c\u0093  '+p,size:24,color:'374151',font:'Arial'})],spacing:{after:100}}));});
      children.push(divider());
    }
    children.push(new Paragraph({children:[new TextRun({text:'Procedure \u00e2\u0080\u0094 '+bkm.steps.length+' Steps',size:32,bold:true,color:'1A1F2E',font:'Arial'})],spacing:{before:200,after:200}}));
    for(var si=0;si<bkm.steps.length;si++){
      var s=bkm.steps[si];
      children.push(new Paragraph({children:[new TextRun({text:' '+(si+1)+' ',size:22,color:'FFFFFF',bold:true,font:'Arial',shading:{type:ShadingType.CLEAR,fill:'E8192C'}}),new TextRun({text:'  '+s.title,size:28,bold:true,color:'1A1F2E',font:'Arial'})],spacing:{before:260,after:100}}));
      children.push(para(s.description,{color:'374151',indent:360}));
      children.push(new Paragraph({children:[new TextRun({text:'\u00e2\u0096\u00b6  '+s.action,size:20,color:'C0001A',font:'Courier New'})],spacing:{after:100,before:60},indent:{left:360},shading:{type:ShadingType.CLEAR,fill:'FFF5F5'},border:{left:{style:BorderStyle.SINGLE,size:10,color:'E8192C',space:8}}}));
      if(s.note)children.push(new Paragraph({children:[new TextRun({text:'\u00e2\u009a\u00a0  '+s.note,size:20,color:'B45309',font:'Arial',italics:true})],spacing:{after:100,before:60},indent:{left:360},shading:{type:ShadingType.CLEAR,fill:'FFFBEB'}}));
      var fr=state.frames[(s.frameIndex!==undefined&&s.frameIndex!==null)?parseInt(s.frameIndex):si]||state.frames[state.frames.length-1];
      var img=await makeImg(fr);
      if(img) children.push(new Paragraph({children:[img],spacing:{before:100,after:200},indent:{left:360}}));
      else children.push(para('[Screenshot \u00e2\u0080\u0094 Step '+(si+1)+']',{color:'94A3B8',italic:true,indent:360}));
    }
    children.push(divider());
    children.push(label('Expected Outcome','16A34A'));
    children.push(para('\u00e2\u009c\u0085  '+bkm.expectedOutcome,{color:'166534'}));
    children.push(divider());
    if((bkm.troubleshooting||[]).length>0){
      children.push(label('Troubleshooting','6B7585'));
      bkm.troubleshooting.forEach(function(t){children.push(new Paragraph({children:[new TextRun({text:'\u00e2\u0080\u00ba  '+t,size:22,color:'7F1D1D',font:'Arial'})],spacing:{after:100},shading:{type:ShadingType.CLEAR,fill:'FFF5F5'},border:{left:{style:BorderStyle.SINGLE,size:8,color:'E8192C',space:6}},indent:{left:200}}));});
    }
    children.push(divider());
    children.push(new Paragraph({children:[new TextRun({text:bkm.title+' \u00c2\u00b7 BKM Studio \u00c2\u00b7 Bosch',size:18,color:'6B7585',font:'Arial'})],alignment:AlignmentType.CENTER}));
    var doc=new Document({styles:{default:{document:{run:{font:'Arial',size:24}}}},sections:[{properties:{page:{size:{width:12240,height:15840},margin:{top:1080,right:1080,bottom:1080,left:1080}}},children:children}]});
    var buffer=await Packer.toBlob(doc);
    downloadBlob(buffer,safeFilename(bkm.title)+'.docx');
    setBtnState('word','done');setExportStatus('\u00e2\u009c\u0085 Word document downloaded!','success');
  }catch(e){setBtnState('word','');setExportStatus('\u00e2\u009d\u008c Word export failed: '+e.message,'error');}
}

function downloadBlob(blob,filename){var url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},1000);}
function safeFilename(t){return (t||'BKM').replace(/[^a-z0-9\-_ ]/gi,'').replace(/\s+/g,'-').slice(0,60)||'BKM';}

  var date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var logoSrc=state.logoDataUrl||document.getElementById('logoImg').src;
  var logoHtml=logoSrc?'<img src="'+logoSrc+'" style="height:44px;max-width:150px;object-fit:contain;display:block" alt="Logo"/>':'';
  var colors=['#c0001a','#b91c1c','#9b1c1c','#7f1d1d','#dc2626','#e8192c','#ef4444'];

  var prereqs=(bkm.prerequisites||[]).map(function(p){return '<li style="display:flex;align-items:flex-start;gap:10px;font-size:14px;color:#374151;margin-bottom:7px"><span style="color:#c0001a;font-weight:800;flex-shrink:0;font-size:16px">\u00e2\u009c\u0093</span>'+e(p)+'</li>';}).join('');
  var trouble=(bkm.troubleshooting||[]).map(function(t){return '<li style="display:flex;gap:10px;font-size:13px;color:#7f1d1d;padding:10px 14px;background:#fff5f5;border-radius:8px;border-left:4px solid #e8192c;margin-bottom:8px"><span style="font-weight:700;flex-shrink:0">\u00e2\u0080\u00ba</span>'+e(t)+'</li>';}).join('');
  var steps=(bkm.steps||[]).map(function(s,si){
    var col=colors[si%colors.length];
    var fi=(s.frameIndex!==undefined&&s.frameIndex!==null)?parseInt(s.frameIndex):si;
    var frame=state.frames[fi]||state.frames[state.frames.length-1];
    var img=frame?'<img src="'+frame.dataUrl+'" style="width:calc(100% - 46px);margin-left:46px;border-radius:8px;border:1px solid #e5e7eb;display:block;margin-top:14px" alt="Step '+(si+1)+' screenshot"/>'
      :'<div style="margin-left:46px;margin-top:14px;background:#f9fafb;border:2px dashed #d1d5db;border-radius:10px;padding:24px;text-align:center"><div style="font-size:24px;margin-bottom:4px">\u00f0\u009f\u0093\u00b7</div><div style="font-size:12px;color:#9ca3af">Screenshot \u00e2\u0080\u0094 Step '+(si+1)+'</div></div>';
    return '<div style="background:#fff;border:1px solid #e5e7eb;border-left:4px solid '+col+';border-radius:12px;padding:22px;margin-bottom:16px;page-break-inside:avoid;box-shadow:0 1px 3px rgba(0,0,0,.06)">'
      +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">'
      +'<div style="width:32px;height:32px;border-radius:50%;background:'+col+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0">'+(si+1)+'</div>'
      +'<strong style="font-size:16px;color:#1a1f2e">'+e(s.title)+'</strong></div>'
      +'<p style="color:#4b5563;font-size:14px;line-height:1.7;margin:0 0 12px 46px">'+e(s.description)+'</p>'
      +'<div style="margin-left:46px;background:#fff5f5;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;margin-bottom:'+(s.note?'10px':'0')+'">'
      +'<span style="color:'+col+';margin-right:8px;font-size:11px;font-weight:700">\u00e2\u0096\u00b6</span>'
      +'<code style="font-family:monospace;font-size:13px;color:#374151">'+e(s.action)+'</code></div>'
      +(s.note?'<div style="margin-left:46px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:13px;color:#92400e">\u00e2\u009a\u00a0 '+e(s.note)+'</div>':'')
      +img+'</div>';
  }).join('');

  return '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>'+e(bkm.title)+' \u00e2\u0080\u0094 BKM</title>'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Segoe UI",Arial,sans-serif;background:#f0f2f5;color:#1a1f2e;line-height:1.6}.page{max-width:900px;margin:0 auto;padding:40px 32px}@media print{body{background:#fff}.page{padding:20px}img{max-width:100%!important;page-break-inside:avoid}}</style>'
    +'</head><body><div class="page">'

    // Header
    +'<div style="background:#fff;border-bottom:3px solid #e8192c;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:20px 32px;margin:-40px -32px 32px;display:flex;align-items:center;justify-content:space-between">'
    +'<div>'+logoHtml+'</div>'
    +'<div style="text-align:right"><div style="font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#e8192c;margin-bottom:3px">Best Known Method</div><div style="font-size:11px;color:#6b7585">'+date+'</div></div>'
    +'</div>'

    // Title banner
    +'<div style="background:linear-gradient(135deg,#c0001a,#e8192c);color:#fff;padding:32px 36px;border-radius:12px;margin-bottom:24px;position:relative;overflow:hidden">'
    +'<div style="position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.03) 40px,rgba(255,255,255,.03) 80px)"></div>'
    +'<div style="position:relative"><div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:8px;font-weight:600">Procedure Guide</div>'
    +'<h1 style="font-size:26px;font-weight:800;line-height:1.2;margin-bottom:14px">'+e(bkm.title)+'</h1>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +'<span style="background:rgba(255,255,255,.18);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:600">\u00f0\u009f\u0093\u008b '+(bkm.steps||[]).length+' Steps</span>'
    +'</div></div></div>'

    // Purpose / Scope
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px">'
    +'<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px;border-left:3px solid #e8192c;box-shadow:0 1px 3px rgba(0,0,0,.05)"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#c0001a;margin-bottom:6px">Purpose</div><div style="font-size:14px;color:#4b5563">'+e(bkm.purpose)+'</div></div>'
    +'<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px;border-left:3px solid #16a34a;box-shadow:0 1px 3px rgba(0,0,0,.05)"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#16a34a;margin-bottom:6px">Scope</div><div style="font-size:14px;color:#4b5563">'+e(bkm.scope)+'</div></div>'
    +'</div>'

    // Prerequisites
    +'<div style="margin-bottom:22px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#c0001a;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid #e8192c">Prerequisites</div>'
    +'<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)"><ul style="list-style:none">'+prereqs+'</ul></div></div>'

    // Steps
    +'<div style="margin-bottom:22px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#c0001a;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid #e8192c">Procedure \u00e2\u0080\u0094 '+(bkm.steps||[]).length+' Steps</div>'+steps+'</div>'

    // Outcome
    +'<div style="margin-bottom:22px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#c0001a;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid #e8192c">Expected Outcome</div>'
    +'<div style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac;border-radius:10px;padding:18px;display:flex;gap:12px;align-items:flex-start"><span style="font-size:20px">\u00e2\u009c\u0085</span><div style="font-size:14px;color:#166534;line-height:1.7">'+e(bkm.expectedOutcome)+'</div></div></div>'

    // Troubleshooting
    +'<div style="margin-bottom:22px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#c0001a;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid #e8192c">Troubleshooting</div><ul style="list-style:none">'+trouble+'</ul></div>'

    // Footer
    +'<div style="margin-top:36px;padding-top:14px;border-top:2px solid #e8192c;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#9ca3af">'
    +'<span style="font-weight:600;color:#c0001a">'+e(bkm.title)+'</span>'
    +(logoHtml?'<div>'+logoHtml+'</div>':'<span style="color:#e8192c;font-weight:700">BKM Studio</span>')
    +'<span>'+date+'</span></div>'
    +'</div></body></html>';
}

function resetAll(){
  var logo=state.logoDataUrl,imgSrc=document.getElementById('logoImg').src;
  state={stage:'input',mode:'prompt',prompt:'',videoFile:null,frames:[],frameInterval:5,bkm:null,exportHtml:'',logoDataUrl:logo};
  var v=document.getElementById('frameVideo');if(v){v.src='';v.load();}
  setStage('input');
}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Boot
(async function initAuth() {
  await msalInstance.initialize();
  await msalInstance.handleRedirectPromise().catch(function(){});
  var accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    currentAccount = accounts[0];
    document.getElementById('auth-overlay').style.display = 'none';
    updateUserDisplay();
  }
  setStage('input');
})();
</script>
